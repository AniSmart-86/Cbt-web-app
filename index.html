<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mater Dei CBT Portal</title>
<link rel="stylesheet" href="Style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Mater Dei CBT Exam</h2>
<input type="text" id="username" placeholder="Enter Your Name">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
<p id="loginError"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
<h2>Select Class</h2>
<select id="classSelect">
<option value="">-- Select Class --</option>
<option>JSS1</option>
<option>JSS2</option>
<option>JSS3</option>
<option>SSS1</option>
<option>SSS2</option>
<option>SSS3</option>
</select>
<button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="examPage" class="hidden">
<div class="topBar">
<span id="displayName"></span>
<span id="displayClass"></span>
<span id="time">20:00</span>
</div>

<div class="examContainer">

<div class="leftPanel">
<h3 id="questionText"></h3>
<div id="options"></div>

<div class="navBtns">
<button onclick="previousQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitExam()">Submit</button>
</div>

<p>
Answered: <span id="answeredCount">0</span> |
Unanswered: <span id="unansweredCount">30</span>
</p>
</div>

<div class="rightPanel">
<h4>Questions</h4>
<div id="questionGrid"></div>
</div>

</div>
</div>

<!-- RESULT -->
<div id="resultPage" class="container hidden">
<h2>Exam Result</h2>
<h3 id="finalMessage"></h3>
<p id="scoreText"></p>
<button onclick="logout()">Logout</button>
</div>

<script src="Script.js"></script>
</body>
</html>
